name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,plot,web]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Test
        run: pytest --cov=ena_python --cov-report=term-missing

  # Typecheck runs once, not per matrix entry. numpy's stubs describe array shapes
  # differently across releases (2.2 infers ndarray[tuple[int, int]] where 2.5 does
  # not), and pip resolves a different numpy per Python version, so the same source
  # yields different mypy output per job. Those differences are stub artifacts, not
  # defects, and pinning `python_version` is not a fix either: it makes mypy parse
  # numpy >= 2.2's PEP 695 stubs under older syntax rules and fail outright. The
  # runtime matrix above still exercises 3.10-3.13.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,plot,web]"
      - name: Typecheck
        run: mypy src/ena_python

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install -U pip build twine
          python -m build
      - name: Check metadata
        run: python -m twine check --strict dist/*
      - name: Verify the wheel imports on its own
        # Installed outside the source tree so a missing packaged module cannot be
        # masked by ./src being importable from the working directory.
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/python -m pip install -q dist/*.whl
          cd /tmp
          /tmp/fresh/bin/python -c "import ena_python; print('ena_python', ena_python.__version__)"
          /tmp/fresh/bin/ena-python version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
