name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,plot,web]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Typecheck
        run: mypy src/pyena
      - name: Test
        run: pytest --cov=pyena --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install -U pip build twine
          python -m build
      - name: Check metadata
        run: python -m twine check --strict dist/*
      - name: Verify the wheel imports on its own
        # Installed outside the source tree so a missing packaged module cannot be
        # masked by ./src being importable from the working directory.
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/python -m pip install -q dist/*.whl
          cd /tmp
          /tmp/fresh/bin/python -c "import pyena; print('pyena', pyena.__version__)"
          /tmp/fresh/bin/pyena version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
